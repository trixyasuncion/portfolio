<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🐍 Smooth Snake Game | Responsive</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #1a2f28 0%, #1e3b2f 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 20px;
      margin: 0;
      touch-action: manipulation; /* improves mobile responsiveness */
    }

    .game-container {
      background: #0f2419;
      border-radius: 2.5rem;
      padding: 1.8rem 1.5rem 1.5rem;
      box-shadow: 0 30px 45px rgba(0, 0, 0, 0.6), inset 0 0 10px rgba(255, 255, 200, 0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      width: fit-content;
      max-width: 100%;
      border: 1px solid #5b8c5a;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-bottom: 1.2rem;
      color: #e0f0da;
      font-weight: bold;
    }

    .score-board {
      background: #0b1e14;
      padding: 0.7rem 1.8rem;
      border-radius: 3rem;
      font-size: 1.8rem;
      letter-spacing: 2px;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.7), 0 6px 10px rgba(0,0,0,0.5);
      color: #cbf078;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      border: 1px solid #527a4a;
    }

    .score-label {
      font-size: 1rem;
      text-transform: uppercase;
      color: #b9d8b1;
      margin-right: 0.2rem;
    }

    .restart-btn {
      background: #2d4a2d;
      border: none;
      color: #f0ffe0;
      font-size: 1.4rem;
      padding: 0.6rem 1.4rem;
      border-radius: 2.5rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 0 #142114, 0 8px 15px rgba(0,0,0,0.5);
      transition: all 0.08s ease;
      background: #3f5e3a;
      border: 1px solid #7aa56f;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .restart-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #142114, 0 5px 10px rgba(0,0,0,0.5);
      background: #355031;
    }

    canvas {
      display: block;
      margin: 0 auto;
      border-radius: 2rem;
      background: #1e3322;
      box-shadow: inset 0 0 25px #00000066, 0 20px 25px rgba(0, 0, 0, 0.7);
      width: 100%;
      height: auto;
      max-width: 400px;
      aspect-ratio: 1 / 1;
      border: 2px solid #6f8f6a;
      touch-action: none;  /* prevent pull-to-refresh on canvas */
    }

    .controls {
      margin-top: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.7rem;
      width: 100%;
    }

    .arrow-row {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin: 0;
    }

    .control-btn {
      background: #2c402c;
      border: none;
      width: 65px;
      height: 65px;
      border-radius: 2rem;
      font-size: 2.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e6f5d6;
      box-shadow: 0 7px 0 #101f10, 0 10px 18px black;
      cursor: pointer;
      transition: 0.06s ease;
      background: radial-gradient(circle at 30% 30%, #5b7e4e, #233a1e);
      border: 1px solid #8fb07e;
      user-select: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .control-btn:active {
      transform: translateY(4px);
      box-shadow: 0 3px 0 #0f1a0f, 0 6px 12px black;
      background: radial-gradient(circle at 30% 30%, #4a683e, #1e311a);
    }

    .middle-row {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    @media (max-width: 450px) {
      .game-container {
        padding: 1.2rem 0.8rem 1rem;
      }
      .control-btn {
        width: 55px;
        height: 55px;
        font-size: 2rem;
      }
      .score-board {
        font-size: 1.5rem;
        padding: 0.5rem 1.3rem;
      }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <div class="score-board">
      <span class="score-label">🍎</span>
      <span id="scoreDisplay">0</span>
    </div>
    <button class="restart-btn" id="restartButton">
      <span>↺</span> NEW
    </button>
  </div>

  <!-- Canvas: fixed grid 20x20 for classic snake feel -->
  <canvas id="snakeCanvas" width="400" height="400"></canvas>

  <div class="controls">
    <div class="arrow-row">
      <button class="control-btn" id="btnUp">▲</button>
    </div>
    <div class="middle-row">
      <button class="control-btn" id="btnLeft">◀</button>
      <button class="control-btn" id="btnDown">▼</button>
      <button class="control-btn" id="btnRight">▶</button>
    </div>
  </div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('snakeCanvas');
    const ctx = canvas.getContext('2d');
    const scoreSpan = document.getElementById('scoreDisplay');

    // Grid configuration
    const GRID_SIZE = 20;          // 20x20 cells
    const CELL_SIZE = canvas.width / GRID_SIZE; // 20px per cell

    // Game state variables
    let snake = [
      {x: 10, y: 10},
      {x: 9, y: 10},
      {x: 8, y: 10}
    ];
    let food = {x: 15, y: 10};
    let direction = 'RIGHT';     // current moving direction
    let nextDirection = 'RIGHT';
    let score = 0;
    let gameOver = false;
    let gameInterval = null;
    let gameSpeed = 120;         // milliseconds per move (smooth & responsive)
    let animationFrameId = null;

    // Prevent direction reversal flags (to avoid instant self-collision)
    let pendingDirection = null;

    // ---- Helper functions ----
    function randomGridPosition() {
      return {
        x: Math.floor(Math.random() * GRID_SIZE),
        y: Math.floor(Math.random() * GRID_SIZE)
      };
    }

    // Generate food that is not on snake
    function generateValidFood() {
      if (snake.length >= GRID_SIZE * GRID_SIZE) {
        // Win condition (snake fills entire grid) - rare but handled
        return null;
      }
      const newFood = randomGridPosition();
      const collision = snake.some(segment => segment.x === newFood.x && segment.y === newFood.y);
      if (collision) {
        return generateValidFood(); // recursive until free spot
      }
      return newFood;
    }

    // Reset entire game
    function resetGame() {
      // Clear any running timers
      stopGameLoop();
      // Reset state
      snake = [
        {x: 10, y: 10},
        {x: 9, y: 10},
        {x: 8, y: 10}
      ];
      direction = 'RIGHT';
      nextDirection = 'RIGHT';
      pendingDirection = null;
      gameOver = false;
      score = 0;
      scoreSpan.textContent = '0';
      gameSpeed = 120;

      // Place valid food
      const newFood = generateValidFood();
      if (newFood) {
        food = newFood;
      } else {
        food = {x: 15, y: 10}; // fallback
      }

      drawCanvas();
      startGameLoop();
    }

    // Stop game loop (interval and animation frame)
    function stopGameLoop() {
      if (gameInterval) {
        clearInterval(gameInterval);
        gameInterval = null;
      }
      if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
      }
    }

    // Game over trigger
    function setGameOver() {
      if (gameOver) return;
      gameOver = true;
      stopGameLoop();
      // Draw game over overlay on canvas
      drawCanvas();
    }

    // Move snake logic
    function moveSnake() {
      if (gameOver) return;

      // Apply queued direction (from buttons or keyboard)
      if (pendingDirection) {
        const newDir = pendingDirection;
        // Prevent reversing direction
        const opposite = {
          'UP': 'DOWN',
          'DOWN': 'UP',
          'LEFT': 'RIGHT',
          'RIGHT': 'LEFT'
        };
        if (direction !== opposite[newDir]) {
          direction = newDir;
          nextDirection = newDir;
        }
        pendingDirection = null;
      }

      // Calculate new head
      const head = snake[0];
      let newHead = { ...head };

      switch (direction) {
        case 'RIGHT':
          newHead.x += 1;
          break;
        case 'LEFT':
          newHead.x -= 1;
          break;
        case 'DOWN':
          newHead.y += 1;
          break;
        case 'UP':
          newHead.y -= 1;
          break;
        default: break;
      }

      // Check wall collision
      if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
        setGameOver();
        drawCanvas();
        return;
      }

      // Check self collision (snake eats itself) - skip the tail if not growing
      // We'll handle food consumption first to know if tail remains
      const willEatFood = (newHead.x === food.x && newHead.y === food.y);

      // Build new snake array
      let newSnake;
      if (willEatFood) {
        // Grow: add new head, keep all segments
        newSnake = [newHead, ...snake];
      } else {
        // Move: add new head, remove tail
        newSnake = [newHead, ...snake.slice(0, -1)];
      }

      // Check self-collision with new snake (excluding head comparison with itself)
      const headCollision = newSnake.slice(1).some(segment => segment.x === newHead.x && segment.y === newHead.y);
      if (headCollision) {
        setGameOver();
        drawCanvas();
        return;
      }

      // Update snake
      snake = newSnake;

      // Handle food consumption
      if (willEatFood) {
        score++;
        scoreSpan.textContent = score;

        // Generate new food
        const newFood = generateValidFood();
        if (newFood) {
          food = newFood;
        } else {
          // Grid full -> win condition: player wins, stop game with message
          setGameOver(); // treated as win, but game stops
          drawCanvas();
          return;
        }

        // Optional: slight speed increase (smooth)
        if (gameSpeed > 55) {
          gameSpeed = Math.max(55, gameSpeed - 2);
          // Restart interval with new speed
          restartInterval();
        }
      }

      // Redraw canvas
      drawCanvas();
    }

    function restartInterval() {
      if (gameOver) return;
      stopGameLoop();
      startGameLoop();
    }

    function startGameLoop() {
      if (gameOver) return;
      if (gameInterval) clearInterval(gameInterval);
      gameInterval = setInterval(moveSnake, gameSpeed);
    }

    // --- Drawing with smooth rounded corners & style ---
    function drawCanvas() {
      if (!ctx) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw grid background (subtle)
      ctx.fillStyle = '#1f3524';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw grid lines (very light)
      ctx.strokeStyle = '#345335';
      ctx.lineWidth = 0.6;
      for (let i = 0; i <= GRID_SIZE; i++) {
        ctx.beginPath();
        ctx.moveTo(i * CELL_SIZE, 0);
        ctx.lineTo(i * CELL_SIZE, canvas.height);
        ctx.stroke();
        ctx.moveTo(0, i * CELL_SIZE);
        ctx.lineTo(canvas.width, i * CELL_SIZE);
        ctx.stroke();
      }

      // Draw food (apple style with smooth glow)
      const fx = food.x * CELL_SIZE, fy = food.y * CELL_SIZE;
      const padding = 2;
      const radius = (CELL_SIZE - padding * 2) / 2;

      // Food shadow
      ctx.shadowColor = '#ffbb4d';
      ctx.shadowBlur = 8;
      ctx.fillStyle = '#f05454';
      ctx.beginPath();
      ctx.arc(fx + CELL_SIZE/2, fy + CELL_SIZE/2, radius, 0, Math.PI * 2);
      ctx.fill();
      // Inner highlight
      ctx.shadowBlur = 4;
      ctx.fillStyle = '#ff7b7b';
      ctx.arc(fx + CELL_SIZE/2 - 1, fy + CELL_SIZE/2 - 1, radius-1.5, 0, Math.PI*2);
      ctx.fill();
      // Leaf
      ctx.shadowBlur = 3;
      ctx.fillStyle = '#6ab04c';
      ctx.beginPath();
      ctx.ellipse(fx + CELL_SIZE/2 + 2, fy + CELL_SIZE/2 - 5, 2.5, 5, 0.3, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;

      // Draw snake with smooth rounded segments
      for (let i = 0; i < snake.length; i++) {
        const seg = snake[i];
        const sx = seg.x * CELL_SIZE, sy = seg.y * CELL_SIZE;
        const pad = i === 0 ? 2 : 2.5; // head slightly smaller padding for effect
        const r = (CELL_SIZE - pad * 2) / 2;

        // Head color different
        if (i === 0) {
          ctx.fillStyle = '#7ed957';
          ctx.shadowColor = '#b0ff9b';
          ctx.shadowBlur = 8;
        } else {
          // Gradient body from bright green to darker
          const gradient = ctx.createLinearGradient(sx, sy, sx + CELL_SIZE, sy + CELL_SIZE);
          gradient.addColorStop(0, '#6bbf4a');
          gradient.addColorStop(1, '#3f7a2a');
          ctx.fillStyle = gradient;
          ctx.shadowColor = '#406e2c';
          ctx.shadowBlur = 5;
        }

        ctx.beginPath();
        // Use rounded rectangle for smooth corners
        const xPos = sx + pad;
        const yPos = sy + pad;
        const size = CELL_SIZE - pad * 2;
        ctx.moveTo(xPos + r, yPos);
        ctx.lineTo(xPos + size - r, yPos);
        ctx.quadraticCurveTo(xPos + size, yPos, xPos + size, yPos + r);
        ctx.lineTo(xPos + size, yPos + size - r);
        ctx.quadraticCurveTo(xPos + size, yPos + size, xPos + size - r, yPos + size);
        ctx.lineTo(xPos + r, yPos + size);
        ctx.quadraticCurveTo(xPos, yPos + size, xPos, yPos + size - r);
        ctx.lineTo(xPos, yPos + r);
        ctx.quadraticCurveTo(xPos, yPos, xPos + r, yPos);
        ctx.closePath();
        ctx.fill();

        // Eye on head
        if (i === 0) {
          ctx.shadowBlur = 0;
          ctx.fillStyle = 'white';
          ctx.beginPath();
          ctx.arc(sx + CELL_SIZE/2 - 3, sy + CELL_SIZE/2 - 2, 2.2, 0, Math.PI*2);
          ctx.fill();
          ctx.fillStyle = '#111';
          ctx.beginPath();
          ctx.arc(sx + CELL_SIZE/2 - 2.5, sy + CELL_SIZE/2 - 2.8, 1, 0, Math.PI*2);
          ctx.fill();
          ctx.fillStyle = 'white';
          ctx.beginPath();
          ctx.arc(sx + CELL_SIZE/2 + 3, sy + CELL_SIZE/2 - 2, 2.2, 0, Math.PI*2);
          ctx.fill();
          ctx.fillStyle = '#111';
          ctx.beginPath();
          ctx.arc(sx + CELL_SIZE/2 + 3.5, sy + CELL_SIZE/2 - 2.8, 1, 0, Math.PI*2);
          ctx.fill();
        }
      }
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;

      // Game Over overlay
      if (gameOver) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#f7e3af';
        ctx.font = 'bold 24px "Segoe UI", Roboto';
        ctx.textAlign = 'center';
        ctx.shadowColor = '#000';
        ctx.shadowBlur = 10;
        ctx.fillText('💀 GAME OVER', canvas.width/2, canvas.height/2 - 10);
        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;
        ctx.font = '16px monospace';
        ctx.fillStyle = '#cfebc7';
        ctx.fillText('press NEW or button', canvas.width/2, canvas.height/2 + 35);
      }
    }

    // --- Direction change with safety ---
    function requestDirection(dir) {
      if (gameOver) return;
      // Store as pending, moveSnake applies before next move
      pendingDirection = dir;
    }

    // --- Keyboard controls ---
    function handleKeyDown(e) {
      const key = e.key;
      // Prevent page scrolling with arrows
      if (key.startsWith('Arrow')) {
        e.preventDefault();
      }
      if (key === 'ArrowUp' || key === 'ArrowDown' || key === 'ArrowLeft' || key === 'ArrowRight') {
        e.preventDefault();
        const dirMap = {
          'ArrowUp': 'UP',
          'ArrowDown': 'DOWN',
          'ArrowLeft': 'LEFT',
          'ArrowRight': 'RIGHT'
        };
        requestDirection(dirMap[key]);
      } else if (key === 'r' || key === 'R') {
        e.preventDefault();
        resetGame();
      }
    }

    // --- Button listeners ---
    document.getElementById('btnUp').addEventListener('click', (e) => {
      e.preventDefault();
      requestDirection('UP');
    });
    document.getElementById('btnDown').addEventListener('click', (e) => {
      e.preventDefault();
      requestDirection('DOWN');
    });
    document.getElementById('btnLeft').addEventListener('click', (e) => {
      e.preventDefault();
      requestDirection('LEFT');
    });
    document.getElementById('btnRight').addEventListener('click', (e) => {
      e.preventDefault();
      requestDirection('RIGHT');
    });

    document.getElementById('restartButton').addEventListener('click', (e) => {
      e.preventDefault();
      resetGame();
    });

    // Prevent touch events on buttons from causing canvas issues
    const allBtns = document.querySelectorAll('button');
    allBtns.forEach(btn => {
      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        btn.click();
      });
    });

    // Canvas touch prevention
    canvas.addEventListener('touchstart', (e) => e.preventDefault());

    // Window event listeners
    window.addEventListener('keydown', handleKeyDown);

    // Initial start
    function initialGameStart() {
      // Ensure food valid
      const validFood = generateValidFood();
      if (validFood) food = validFood;
      drawCanvas();
      startGameLoop();
    }

    initialGameStart();

    // Cleanup (not strictly necessary but good practice for hypothetical SPA)
    window.addEventListener('beforeunload', () => {
      stopGameLoop();
      window.removeEventListener('keydown', handleKeyDown);
    });
  })();
</script>
</body>
</html>
